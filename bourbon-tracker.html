<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bourbon Cabinet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f0c08;
    --surface:   #1a1510;
    --surface2:  #221d16;
    --border:    #2e2619;
    --amber:     #c8832a;
    --amber-lt:  #e8a84a;
    --gold:      #f0c060;
    --cream:     #f2e8d4;
    --muted:     #7a6a55;
    --danger:    #b84040;
    --low:       #a86020;
    --full:      #60a840;
    --finished:  #4a7a9a;
    --risk-mod:  #a87820;
    --risk-high: #b84040;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono:    'DM Mono', 'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: var(--font-mono); font-size: 13px; min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    padding: 36px 48px 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .header-left h1 { font-family: var(--font-display); font-size: 2.8rem; font-weight: 400; letter-spacing: -0.02em; color: var(--cream); line-height: 1; }
  .header-left h1 span { color: var(--amber); font-style: italic; }
  .header-left p { margin-top: 6px; color: var(--muted); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }

  .header-right { display: flex; align-items: flex-end; gap: 0; }

  .tab-nav { display: flex; }
  .tab-btn {
    background: none; border: none; border-bottom: 3px solid transparent;
    color: var(--muted); padding: 12px 28px 10px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--cream); }
  .tab-btn.active { color: var(--cream); border-bottom-color: var(--amber); }
  .tab-btn.tab-finished.active { border-bottom-color: var(--finished); }

  .btn-add {
    background: var(--amber); color: #0f0c08; border: none;
    padding: 10px 22px 10px; font-family: var(--font-mono); font-size: 12px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    align-self: center; margin-left: 16px; margin-bottom: 3px;
  }
  .btn-add:hover { background: var(--amber-lt); transform: translateY(-1px); }

  .btn-io {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; align-self: center; margin-left: 8px; margin-bottom: 3px;
  }
  .btn-io:hover { border-color: var(--amber); color: var(--amber); }
  .btn-io-row { display: none; }

  /* ── STATS ── */
  .stats-bar { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .stat { padding: 16px 28px; border-right: 1px solid var(--border); flex-shrink: 0; }
  .stat-val { font-size: 1.5rem; font-family: var(--font-display); color: var(--amber-lt); line-height: 1; }
  .stat-val.blue { color: #6aaabb; }
  .stat-label { margin-top: 4px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* ── TOOLBAR ── */
  .toolbar { padding: 14px 48px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 13px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--amber); color: var(--amber); }
  .filter-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(200,131,42,0.08); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); }

  /* ── CARD ── */
  .card { background: var(--surface); cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; animation: fadeIn 0.3s ease both; overflow: hidden; }
  .card:hover { background: var(--surface2); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .card-strip { height: 4px; width: 100%; flex-shrink: 0; }
  .card-body  { display: flex; flex: 1; min-height: 148px; }

  .label-panel {
    flex: 1; padding: 15px 14px 13px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .label-panel-wash { position: absolute; inset: 0; pointer-events: none; }
  .label-distillery { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 4px; }
  .label-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--cream); line-height: 1.2; }
  .label-sub  { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .label-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .label-stars  { color: var(--gold); font-size: 11px; margin-top: 5px; letter-spacing: 1px; }

  /* Oxidation risk bar */
  .risk-bar {
    margin-top: 8px; padding: 5px 8px;
    border-left: 2px solid; font-size: 10px; letter-spacing: 0.04em; line-height: 1.4;
  }
  .risk-bar.moderate { border-color: var(--risk-mod); background: rgba(168,120,32,0.1); color: var(--risk-mod); }
  .risk-bar.high     { border-color: var(--risk-high); background: rgba(184,64,64,0.1); color: var(--risk-high); }
  .risk-bar .drink-by { display: block; font-size: 9px; opacity: 0.8; margin-top: 2px; }

  .badge { display: inline-block; font-size: 9px; padding: 2px 6px; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid; line-height: 1.6; }
  .badge-low      { border-color: var(--low);      color: var(--low);      background: rgba(168,96,32,0.12); }
  .badge-finished { border-color: var(--finished); color: var(--finished); background: rgba(74,122,154,0.12); }
  .badge-sealed   { border-color: var(--muted);    color: var(--muted);    background: transparent; }
  .badge-open     { border-color: var(--full);     color: var(--full);     background: rgba(96,168,64,0.10); }
  .badge-info     { border-color: var(--border);   color: var(--muted);    background: transparent; }

  .bottle-panel { width: 88px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 8px 10px; gap: 7px; }
  .bottle-svg { width: 42px; }
  .level-track { width: 60px; height: 5px; background: var(--border); position: relative; overflow: hidden; }
  .level-fill  { position: absolute; left:0; top:0; bottom:0; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .level-pct-big { font-family: var(--font-display); font-size: 1.05rem; line-height: 1; text-align: center; }

  .card-footer { padding: 7px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 0.03em; }

  /* ── FINISHED VIEW ── */
  #finishedView { display: none; }
  #finishedView.active { display: block; }

  .finished-stats { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }

  .group-block { border-bottom: 2px solid var(--border); }
  .group-header {
    padding: 18px 48px 12px;
    display: flex; align-items: baseline; gap: 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .group-name { font-family: var(--font-display); font-size: 1.2rem; color: var(--cream); font-style: italic; }
  .group-count { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .group-distillery { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Finished card — horizontal list layout */
  .finished-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }

  .finished-card {
    background: var(--surface); padding: 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
    animation: fadeIn 0.3s ease both; cursor: pointer;
    transition: background 0.15s; position: relative; overflow: hidden;
  }
  .finished-card:hover { background: var(--surface2); }
  .finished-card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }

  .finished-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .finished-card-num { font-family: var(--font-display); font-size: 1.6rem; color: var(--finished); opacity: 0.4; line-height: 1; }

  .finished-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .fstat { }
  .fstat-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .fstat-val   { font-size: 12px; color: var(--cream); }
  .fstat-val.accent { color: var(--finished); }

  .finished-notes { font-size: 11px; color: var(--muted); line-height: 1.6; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; }

  /* ── EMPTY ── */
  .empty-state { grid-column:1/-1; padding: 80px 48px; text-align: center; background: var(--surface); }
  .empty-state p { font-family: var(--font-display); font-size: 1.4rem; color: var(--muted); font-style: italic; }
  .empty-state small { display:block; margin-top:8px; font-size:11px; color:var(--border); letter-spacing:.1em; text-transform:uppercase; }

  /* ── MODALS ── */
  .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; padding:24px; }
  .backdrop.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; animation:modalIn 0.2s ease both; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);} }

  .modal-header { padding:24px 28px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title  { font-family:var(--font-display); font-size:1.4rem; font-weight:400; color:var(--cream); }
  .modal-title span { color:var(--amber); font-style:italic; }
  .modal-close  { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:4px; transition:color 0.15s; }
  .modal-close:hover { color:var(--cream); }
  .modal-body   { padding:24px 28px; display:flex; flex-direction:column; gap:16px; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  .field input,.field select,.field textarea { background:var(--bg); border:1px solid var(--border); color:var(--cream); padding:8px 12px; font-family:var(--font-mono); font-size:12px; outline:none; transition:border-color 0.15s; width:100%; -webkit-appearance:none; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--amber); }
  .field textarea { resize:vertical; min-height:80px; }
  .field select option { background:var(--surface); }

  .level-slider-wrap { display:flex; align-items:center; gap:12px; }
  .level-slider-wrap input[type=range] { flex:1; -webkit-appearance:none; height:4px; background:var(--border); border:none; padding:0; cursor:pointer; }
  .level-slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:var(--amber); border-radius:50%; cursor:pointer; }

  .star-row { display:flex; gap:4px; }
  .star { font-size:20px; cursor:pointer; color:var(--border); transition:color 0.1s; line-height:1; user-select:none; }
  .star.lit { color:var(--gold); }
  .star:hover { color:var(--amber-lt); }

  .modal-footer { padding:16px 28px 24px; display:flex; justify-content:space-between; gap:12px; border-top:1px solid var(--border); }
  .btn { padding:9px 20px; font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border:1px solid; transition:all 0.15s; }
  .btn-primary { background:var(--amber); border-color:var(--amber); color:#0f0c08; }
  .btn-primary:hover { background:var(--amber-lt); border-color:var(--amber-lt); }
  .btn-ghost { background:none; border-color:var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--cream); color:var(--cream); }
  .btn-danger { background:none; border-color:var(--danger); color:var(--danger); }
  .btn-danger:hover { background:var(--danger); color:#fff; }

  /* Detail modal */
  .detail-section { border-bottom:1px solid var(--border); padding-bottom:16px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .detail-item .dl { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
  .detail-item .dv { font-size:13px; color:var(--cream); }
  .detail-notes { font-size:12px; color:var(--cream); line-height:1.7; white-space:pre-wrap; }
  .detail-level { display:flex; align-items:center; gap:12px; }
  .detail-level-track { flex:1; height:8px; background:var(--border); position:relative; overflow:hidden; }
  .detail-level-fill { position:absolute; left:0; top:0; bottom:0; }
  .distillery-tag { display:inline-block; padding:3px 10px; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; border-left:3px solid; margin-bottom:12px; }

  /* Detail risk block */
  .risk-detail {
    padding: 12px 14px; border: 1px solid; margin-top: 12px;
  }
  .risk-detail.moderate { border-color: var(--risk-mod); background: rgba(168,120,32,0.08); }
  .risk-detail.high     { border-color: var(--risk-high); background: rgba(184,64,64,0.08); }
  .risk-detail-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .risk-detail.moderate .risk-detail-title { color: var(--risk-mod); }
  .risk-detail.high     .risk-detail-title { color: var(--risk-high); }
  .risk-detail p { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .risk-detail .drink-by-big { font-family: var(--font-display); font-size: 1.1rem; margin-top: 6px; }
  .risk-detail.moderate .drink-by-big { color: var(--risk-mod); }
  .risk-detail.high     .drink-by-big { color: var(--risk-high); }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); }

  @media (max-width:640px) {
    header { padding:18px 16px 0; flex-direction:column; align-items:stretch; gap:0; }
    .header-left h1 { font-size:1.8rem; }
    .header-left p  { margin-bottom:10px; font-size:10px; }
    .header-right   { flex-direction:column; width:100%; gap:0; }
    .tab-nav        { width:100%; border-top:1px solid var(--border); }
    .tab-btn        { flex:1; padding:10px 4px 8px; font-size:10px; text-align:center; }
    .btn-add        { width:100%; margin:0; padding:12px; text-align:center; border-top:1px solid var(--border); border-radius:0; }
    .btn-io         { flex:1; margin:0; padding:10px 8px; font-size:10px; text-align:center; border-top:1px solid var(--border); border-left:1px solid var(--border); }
    .btn-io-row      { display:flex; width:100%; }
    .stat           { padding:10px 14px; }
    .stat-val       { font-size:1.2rem; }
    .stat-label     { font-size:9px; }
    .toolbar        { padding:10px 16px; gap:6px; }
    .filter-btn     { padding:4px 10px; font-size:10px; }
    .grid,.finished-cards { grid-template-columns:1fr; }
    .form-row       { grid-template-columns:1fr; }
    .modal-body     { padding:16px 16px; gap:12px; }
    .modal-header   { padding:16px 16px 12px; }
    .modal-footer   { padding:12px 16px 20px; }
    .detail-grid    { grid-template-columns:1fr 1fr; }
    .group-header   { padding:14px 16px 10px; }
    .group-name     { font-size:1rem; }
    .finished-stat-row { grid-template-columns:1fr 1fr; }
    .card-body      { min-height:130px; }
    .label-name     { font-size:0.95rem; }
    .bottle-panel   { width:76px; }
    .bottle-svg     { width:36px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>The <span>Bourbon</span> Cabinet</h1>
    <p>Bottle Tracker &amp; Tasting Log</p>
  </div>
  <div class="header-right">
    <div class="tab-nav">
      <button class="tab-btn active" id="tabCabinet" onclick="switchTab('cabinet')">Cabinet</button>
      <button class="tab-btn tab-finished" id="tabFinished" onclick="switchTab('finished')">Finished</button>
    </div>
    <button class="btn-add" id="btnAdd" onclick="openAddModal()">+ Add Bottle</button>
    <div class="btn-io-row">
      <button class="btn-io" onclick="exportCabinet()" title="Export">↓ Export</button>
      <button class="btn-io" onclick="document.getElementById('importInput').click()" title="Import">↑ Import</button>
    </div>
  </div>
</header>
<input type="file" id="importInput" accept=".json" style="display:none" onchange="importCabinet(event)">

<div class="stats-bar" id="statsBar"></div>

<!-- CABINET VIEW -->
<div id="cabinetView">
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('open',this)">Open</button>
    <button class="filter-btn" onclick="setFilter('sealed',this)">Sealed</button>
    <button class="filter-btn" onclick="setFilter('low',this)">Running Low</button>
    <button class="filter-btn" onclick="setFilter('risk',this)">Oxidation Risk</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- FINISHED VIEW -->
<div id="finishedView">
  <div class="finished-stats" id="finishedStats"></div>
  <div id="finishedGroups"></div>
</div>

<!-- FORM MODAL -->
<div class="backdrop" id="formBackdrop" onclick="closeFormModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="formTitle">Add a <span>New Bottle</span></div>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field">
          <label>Bottle Name *</label>
          <div class="autocomplete-wrap">
            <input type="text" id="f-name" placeholder="Type to search catalogue…"
              autocomplete="off"
              oninput="onNameInput(this.value)"
              onkeydown="onNameKeydown(event)"
              onfocus="onNameInput(this.value)"
              onblur="setTimeout(closeAutocomplete,200)">
            <div class="autocomplete-list" id="acList"></div>
          </div>
        </div>
        <div class="field">
          <label>Distillery</label>
          <select id="f-distillery" onchange="onDistilleryChange()">
            <option value="">— Select —</option>
            <option value="Buffalo Trace">Buffalo Trace</option>
            <option value="Knob Creek">Knob Creek</option>
            <option value="Old Forester">Old Forester</option>
            <option value="Bardstown">Bardstown Bourbon Co.</option>
            <option value="Four Roses">Four Roses</option>
            <option value="Heaven Hill">Heaven Hill</option>
            <option value="Wild Turkey">Wild Turkey</option>
            <option value="Maker's Mark">Maker's Mark</option>
            <option value="Woodford Reserve">Woodford Reserve</option>
            <option value="Angel's Envy">Angel's Envy</option>
            <option value="Michter's">Michter's</option>
            <option value="other">Other…</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="customDistRow" style="display:none">
        <div class="field" style="grid-column:2">
          <label>Custom Distillery</label>
          <input type="text" id="f-dist-custom" placeholder="e.g. Cascade Hollow">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Mashbill</label>
          <input type="text" id="f-mashbill" placeholder="e.g. Wheated, High Rye">
        </div>
        <div class="field">
          <label>Age Statement</label>
          <input type="text" id="f-age" placeholder="e.g. 12 Year, NAS">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Proof</label>
          <input type="number" id="f-proof" placeholder="e.g. 90">
        </div>
        <div class="field">
          <label>Price Paid ($)</label>
          <input type="number" id="f-price" placeholder="e.g. 45">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Status</label>
          <select id="f-status" onchange="onStatusChange()">
            <option value="open">Open</option>
            <option value="sealed">Sealed</option>
            <option value="finished">Finished</option>
          </select>
        </div>
        <div class="field">
          <label>Open Date</label>
          <input type="date" id="f-opendate">
        </div>
      </div>
      <div class="field" id="finishDateRow" style="display:none">
        <label>Finish Date</label>
        <input type="date" id="f-finishdate">
      </div>
      <div class="field" id="levelRow">
        <label>Bottle Level — <span id="levelLabel">100%</span></label>
        <div class="level-slider-wrap">
          <input type="range" id="f-level" min="0" max="100" value="100"
            oninput="document.getElementById('levelLabel').textContent=this.value+'%'">
        </div>
      </div>
      <div class="field">
        <label>Rating</label>
        <div class="star-row" id="starRow">
          <span class="star" data-v="1" onclick="setStar(1)">★</span>
          <span class="star" data-v="2" onclick="setStar(2)">★</span>
          <span class="star" data-v="3" onclick="setStar(3)">★</span>
          <span class="star" data-v="4" onclick="setStar(4)">★</span>
          <span class="star" data-v="5" onclick="setStar(5)">★</span>
        </div>
      </div>
      <div class="field">
        <label>Tasting Notes</label>
        <textarea id="f-notes" placeholder="Nose, palate, finish..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteBottle()">Delete</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" onclick="closeFormModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBottle()">Save Bottle</button>
      </div>
    </div>
  </div>
</div>
<!-- DETAIL MODAL -->
<div class="backdrop" id="detailBackdrop" onclick="closeDetailModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDetailModal()">Close</button>
      <button class="btn btn-primary" onclick="editFromDetail()">Edit</button>
    </div>
  </div>
</div>

<script>
// ── THEMES ────────────────────────────────────────────────────────────────────
const THEMES = {
  'Buffalo Trace':    { color: '#8b1515', accent: '#d94040' },
  'Knob Creek':       { color: '#111111', accent: '#c8a830' },
  'Old Forester':     { color: '#163318', accent: '#4e9e50' },
  'Bardstown':        { color: '#0e1f3d', accent: '#4a78cc' },
  'Four Roses':       { color: '#6b1228', accent: '#cc4468' },
  'Heaven Hill':      { color: '#1e1430', accent: '#7850cc' },
  'Wild Turkey':      { color: '#3d1f08', accent: '#c06828' },
  "Maker's Mark":     { color: '#6b0000', accent: '#cc3333' },
  'Woodford Reserve': { color: '#0e2040', accent: '#3d7ac0' },
  "Angel's Envy":     { color: '#200c2e', accent: '#9055b0' },
  "Michter's":        { color: '#2a1808', accent: '#b06830' },
};
function getTheme(d) {
  if (!d) return { color: '#2e2619', accent: '#c8832a' };
  for (const k of Object.keys(THEMES))
    if (d.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(d.toLowerCase()))
      return THEMES[k];
  return { color: '#2e2619', accent: '#c8832a' };
}

// ── OXIDATION RISK ────────────────────────────────────────────────────────────
// Returns { level: 'none'|'moderate'|'high', monthsRemaining, drinkByDate }
function getOxidationRisk(bottle) {
  if (bottle.status !== 'open' || !bottle.openDate) return { level: 'none' };
  const level = bottle.level;
  const daysOpen = Math.floor((Date.now() - new Date(bottle.openDate + 'T00:00:00').getTime()) / 86400000);

  // Thresholds based on fill level (months of safe window)
  // >75%: low risk, ~2yr window. 50-75%: 1-2yr. 25-50%: 6-12mo. <25%: 3-6mo.
  let windowMonths;
  if (level >= 75)      windowMonths = 24;
  else if (level >= 50) windowMonths = 15; // midpoint of 12-18
  else if (level >= 25) windowMonths = 9;  // midpoint of 6-12
  else                  windowMonths = 4;  // midpoint of 3-6

  const windowDays      = windowMonths * 30.4;
  const daysRemaining   = Math.round(windowDays - daysOpen);
  const monthsRemaining = Math.round(daysRemaining / 30.4);

  if (daysRemaining <= 0) {
    return { level: 'high', monthsRemaining: 0, drinkByDate: 'Past window — drink now' };
  }

  // Moderate: <= 6 months remaining. High: <= 2 months remaining.
  const riskLevel = monthsRemaining <= 2 ? 'high' : monthsRemaining <= 6 ? 'moderate' : 'none';
  if (riskLevel === 'none') return { level: 'none' };

  const drinkBy = new Date(Date.now() + daysRemaining * 86400000);
  const drinkByStr = drinkBy.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

  return { level: riskLevel, monthsRemaining, drinkByDate: drinkByStr };
}

function riskLabel(risk) {
  if (risk.level === 'high')     return risk.monthsRemaining <= 0 ? 'Past window' : `~${risk.monthsRemaining}mo left`;
  if (risk.level === 'moderate') return `~${risk.monthsRemaining}mo left`;
  return '';
}

// ── DATA ──────────────────────────────────────────────────────────────────────
let bottles = JSON.parse(localStorage.getItem('bourbonCabinet') || '[]');
let currentFilter = 'all', currentTab = 'cabinet';
let editingId = null, detailId = null, currentRating = 0;

function save() { localStorage.setItem('bourbonCabinet', JSON.stringify(bottles)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}
function daysOpen(s) {
  if (!s) return null;
  const d = Math.floor((Date.now() - new Date(s+'T00:00:00').getTime()) / 86400000);
  return d >= 0 ? d : null;
}
function levelColor(p) {
  if (p <= 10) return 'var(--danger)';
  if (p <= 25) return 'var(--low)';
  return 'var(--amber)';
}
function formatDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+d+', '+y;
}
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabCabinet').classList.toggle('active', tab === 'cabinet');
  document.getElementById('tabFinished').classList.toggle('active', tab === 'finished');
  document.getElementById('cabinetView').style.display = tab === 'cabinet' ? '' : 'none';
  document.getElementById('finishedView').style.display = tab === 'finished' ? 'block' : 'none';
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  if (currentTab === 'cabinet') renderGrid();
  else renderFinished();
}

function renderStats() {
  const open     = bottles.filter(b => b.status === 'open');
  const sealed   = bottles.filter(b => b.status === 'sealed');
  const finished = bottles.filter(b => b.status === 'finished');
  const low      = open.filter(b => b.level <= 25);
  const atRisk   = open.filter(b => getOxidationRisk(b).level !== 'none');
  const avgDays  = open.length ? Math.round(open.reduce((s,b)=>s+(daysOpen(b.openDate)||0),0)/open.length) : 0;

  if (currentTab === 'cabinet') {
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><div class="stat-val">${open.length}</div><div class="stat-label">Open</div></div>
      <div class="stat"><div class="stat-val">${sealed.length}</div><div class="stat-label">Sealed</div></div>
      <div class="stat"><div class="stat-val">${low.length}</div><div class="stat-label">Running Low</div></div>
      <div class="stat"><div class="stat-val">${open.length ? avgDays+'d' : '—'}</div><div class="stat-label">Avg Days Open</div></div>
      <div class="stat"><div class="stat-val" style="color:${atRisk.length?'var(--risk-mod)':'var(--amber-lt)'}">${atRisk.length}</div><div class="stat-label">Oxidation Risk</div></div>`;
  } else {
    const durations = finished.filter(b=>b.openDate&&b.finishDate).map(b=>daysBetween(b.openDate,b.finishDate));
    const avgDur = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : null;
    const uniqueNames = [...new Set(finished.map(b=>b.name))].length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><div class="stat-val blue">${finished.length}</div><div class="stat-label">Bottles Finished</div></div>
      <div class="stat"><div class="stat-val blue">${uniqueNames}</div><div class="stat-label">Unique Bourbons</div></div>
      <div class="stat"><div class="stat-val blue">${avgDur ? avgDur+'d' : '—'}</div><div class="stat-label">Avg Duration</div></div>
      <div class="stat"><div class="stat-val blue">${finished.filter(b=>b.rating>=4).length}</div><div class="stat-label">Rated 4★+</div></div>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const active = bottles.filter(b => b.status !== 'finished');
  let list = active;
  if (currentFilter === 'open')   list = active.filter(b => b.status === 'open');
  if (currentFilter === 'sealed') list = active.filter(b => b.status === 'sealed');
  if (currentFilter === 'low')    list = active.filter(b => b.status === 'open' && b.level <= 25);
  if (currentFilter === 'risk')   list = active.filter(b => getOxidationRisk(b).level !== 'none');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><p>No bottles here yet.</p><small>Add one to get started</small></div>`;
    return;
  }

  grid.innerHTML = list.map((b, i) => {
    const t    = getTheme(b.distillery);
    const days = daysOpen(b.openDate);
    const lc   = levelColor(b.level);
    const disp = b.status === 'sealed' ? 100 : b.level;
    const risk = getOxidationRisk(b);

    const sb = b.status === 'sealed' ? `<span class="badge badge-sealed">Sealed</span>`
             : b.level <= 25         ? `<span class="badge badge-low">Low</span>`
             :                         `<span class="badge badge-open">Open</span>`;
    const stars = b.rating ? '★'.repeat(b.rating)+'☆'.repeat(5-b.rating) : '';

    const riskHTML = risk.level !== 'none' ? `
      <div class="risk-bar ${risk.level}">
        ${risk.level === 'high' ? '⚠ High Oxidation Risk' : '◆ Moderate Oxidation Risk'}
        <span class="drink-by">Drink by ${risk.drinkByDate} · ${riskLabel(risk)}</span>
      </div>` : '';

    return `
    <div class="card" style="animation-delay:${i*.04}s" onclick="openDetail('${b.id}')">
      <div class="card-strip" style="background:${t.color}"></div>
      <div class="card-body">
        <div class="label-panel" style="border-left:3px solid ${t.accent}">
          <div class="label-panel-wash" style="background:${t.color};opacity:0.08"></div>
          <div>
            <div class="label-distillery" style="color:${t.accent}">${esc(b.distillery||'Independent')}</div>
            <div class="label-name">${esc(b.name)}</div>
            ${b.age||b.mashbill ? `<div class="label-sub">${[b.age,b.mashbill].filter(Boolean).join(' · ')}</div>` : ''}
          </div>
          <div>
            <div class="label-badges">
              ${sb}
              ${b.proof ? `<span class="badge badge-info">${b.proof}°</span>` : ''}
            </div>
            ${stars ? `<div class="label-stars">${stars}</div>` : ''}
            ${riskHTML}
          </div>
        </div>
        <div class="bottle-panel">
          ${bottleSVG(disp, lc, t.accent)}
          <div class="level-track"><div class="level-fill" style="width:${disp}%;background:${lc}"></div></div>
          <div class="level-pct-big" style="color:${lc}">${disp}%</div>
        </div>
      </div>
      <div class="card-footer">
        <span>${b.openDate ? formatDate(b.openDate) : (b.status==='sealed'?'Sealed':'No date')}</span>
        ${days!==null&&b.status==='open' ? `<span style="color:${t.accent}">${days}d open</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderFinished() {
  const finished = bottles.filter(b => b.status === 'finished');
  const container = document.getElementById('finishedGroups');

  if (!finished.length) {
    container.innerHTML = `<div class="grid"><div class="empty-state"><p>No finished bottles yet.</p><small>Mark a bottle as finished to see it here</small></div></div>`;
    return;
  }

  // Group by name, sort groups by most recent finishDate
  const groups = {};
  for (const b of finished) {
    if (!groups[b.name]) groups[b.name] = [];
    groups[b.name].push(b);
  }
  // Sort each group by finishDate desc
  for (const name of Object.keys(groups))
    groups[name].sort((a,b) => (b.finishDate||'').localeCompare(a.finishDate||''));

  // Sort group entries by their most recent bottle
  const sortedGroups = Object.entries(groups).sort(([,a],[,b]) =>
    (b[0].finishDate||'').localeCompare(a[0].finishDate||''));

  container.innerHTML = sortedGroups.map(([name, bots], gi) => {
    const t = getTheme(bots[0].distillery);
    const cardsHTML = bots.map((b, i) => {
      const duration = b.openDate && b.finishDate ? daysBetween(b.openDate, b.finishDate) : null;
      const stars = b.rating ? '★'.repeat(b.rating)+'☆'.repeat(5-b.rating) : '—';
      return `
      <div class="finished-card" style="animation-delay:${(gi*0.05+i*0.04)}s" onclick="openDetail('${b.id}')">
        <div class="finished-card-accent" style="background:${t.accent}"></div>
        <div class="finished-card-top">
          <div>
            <div style="font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px">
              ${bots.length > 1 ? `Bottle ${i+1} of ${bots.length}` : 'Finished'}
            </div>
            <div style="color:var(--gold);font-size:12px">${stars}</div>
          </div>
          <div class="finished-card-num">#${i+1}</div>
        </div>
        <div class="finished-stat-row">
          <div class="fstat">
            <div class="fstat-label">Opened</div>
            <div class="fstat-val">${b.openDate ? formatDate(b.openDate) : '—'}</div>
          </div>
          <div class="fstat">
            <div class="fstat-label">Finished</div>
            <div class="fstat-val">${b.finishDate ? formatDate(b.finishDate) : '—'}</div>
          </div>
          <div class="fstat">
            <div class="fstat-label">Duration</div>
            <div class="fstat-val accent">${duration !== null ? duration+'d' : '—'}</div>
          </div>
        </div>
        ${b.notes ? `<div class="finished-notes">${esc(b.notes)}</div>` : ''}
      </div>`;
    }).join('');

    return `
    <div class="group-block">
      <div class="group-header">
        <div class="group-name">${esc(name)}</div>
        <div class="group-distillery" style="color:${t.accent}">${esc(bots[0].distillery||'Independent')}</div>
        <div class="group-count">${bots.length} bottle${bots.length>1?'s':''} finished</div>
      </div>
      <div class="finished-cards">${cardsHTML}</div>
    </div>`;
  }).join('');
}

function bottleSVG(level, fillColor, accentColor) {
  const fh = level * 0.55, fy = 80 - fh;
  const id = 'b'+Math.random().toString(36).slice(2,7);
  return `<svg class="bottle-svg" viewBox="0 0 44 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="${id}"><rect x="0" y="${fy}" width="44" height="${fh+2}"/></clipPath></defs>
    <path d="M18 5 L18 16 C10 20 8 26 8 33 L8 78 C8 82 11 86 16 86 L28 86 C33 86 36 82 36 78 L36 33 C36 26 34 20 26 16 L26 5 Z" fill="#1a1510" stroke="#2e2619" stroke-width="1.5"/>
    <rect x="16" y="1" width="12" height="6" rx="1.5" fill="${accentColor}" opacity="0.6"/>
    <path d="M18 5 L18 16 C10 20 8 26 8 33 L8 78 C8 82 11 86 16 86 L28 86 C33 86 36 82 36 78 L36 33 C36 26 34 20 26 16 L26 5 Z" fill="${fillColor}" opacity="0.65" clip-path="url(#${id})"/>
  </svg>`;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderGrid();
}

// ── STATUS CHANGE (show/hide finish date + level) ─────────────────────────────
function onStatusChange() {
  const v = document.getElementById('f-status').value;
  document.getElementById('finishDateRow').style.display = v === 'finished' ? '' : 'none';
  document.getElementById('levelRow').style.display      = v === 'finished' ? 'none' : '';
  if (v === 'finished') {
    document.getElementById('f-finishdate').value = new Date().toISOString().slice(0,10);
  }
}

// ── DISTILLERY ────────────────────────────────────────────────────────────────
function onDistilleryChange() {
  document.getElementById('customDistRow').style.display =
    document.getElementById('f-distillery').value === 'other' ? 'grid' : 'none';
}
function getDistVal() {
  const v = document.getElementById('f-distillery').value;
  return v === 'other' ? document.getElementById('f-dist-custom').value.trim() : v;
}
function setDistVal(val) {
  const sel = document.getElementById('f-distillery');
  const match = Array.from(sel.options).find(o =>
    o.value && o.value !== 'other' && val &&
    (o.value.toLowerCase() === val.toLowerCase() || val.toLowerCase().startsWith(o.value.toLowerCase())));
  if (match) { sel.value = match.value; document.getElementById('customDistRow').style.display = 'none'; }
  else if (val) { sel.value = 'other'; document.getElementById('f-dist-custom').value = val; document.getElementById('customDistRow').style.display = 'grid'; }
  else { sel.value = ''; document.getElementById('customDistRow').style.display = 'none'; }
}

// ── STARS ─────────────────────────────────────────────────────────────────────
function setStar(v) { currentRating=v; document.querySelectorAll('#starRow .star').forEach(s=>s.classList.toggle('lit',+s.dataset.v<=v)); }
function resetStars(v) { currentRating=v||0; document.querySelectorAll('#starRow .star').forEach(s=>s.classList.toggle('lit',+s.dataset.v<=currentRating)); }

// ── FORM MODAL ────────────────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('formTitle').innerHTML = 'Add a <span>New Bottle</span>';
  document.getElementById('btnDelete').style.display = 'none';
  clearForm();
  document.getElementById('formBackdrop').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const b = bottles.find(x => x.id === id); if (!b) return;
  document.getElementById('formTitle').innerHTML = `Edit <span>${esc(b.name)}</span>`;
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('f-name').value     = b.name || '';
  setDistVal(b.distillery || '');
  document.getElementById('f-mashbill').value = b.mashbill || '';
  document.getElementById('f-age').value      = b.age || '';
  document.getElementById('f-proof').value    = b.proof || '';
  document.getElementById('f-price').value    = b.price || '';
  document.getElementById('f-status').value   = b.status || 'open';
  document.getElementById('f-opendate').value = b.openDate || '';
  document.getElementById('f-finishdate').value = b.finishDate || '';
  document.getElementById('f-level').value    = b.level ?? 100;
  document.getElementById('levelLabel').textContent = (b.level ?? 100) + '%';
  document.getElementById('f-notes').value    = b.notes || '';
  resetStars(b.rating || 0);
  onStatusChange();
  document.getElementById('formBackdrop').classList.add('open');
}

function clearForm() {
  ['f-name','f-mashbill','f-age','f-proof','f-price','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-distillery').value = '';
  document.getElementById('f-dist-custom').value = '';
  document.getElementById('customDistRow').style.display = 'none';
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-opendate').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-finishdate').value = '';
  document.getElementById('f-level').value = 100;
  document.getElementById('levelLabel').textContent = '100%';
  document.getElementById('finishDateRow').style.display = 'none';
  document.getElementById('levelRow').style.display = '';
  resetStars(0);
}

function closeFormModal(e) {
  if (e && e.target !== document.getElementById('formBackdrop')) return;
  document.getElementById('formBackdrop').classList.remove('open');
}

async function saveBottle() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const status   = document.getElementById('f-status').value;
  const userNotes = document.getElementById('f-notes').value.trim();
  const distillery = getDistVal();
  const age  = document.getElementById('f-age').value.trim();
  const proof = document.getElementById('f-proof').value;

  const data = {
    name, distillery,
    mashbill: document.getElementById('f-mashbill').value.trim(),
    age, proof,
    price: document.getElementById('f-price').value,
    status,
    openDate: document.getElementById('f-opendate').value,
    finishDate: status === 'finished' ? document.getElementById('f-finishdate').value : '',
    level: status === 'finished' ? 0 : +document.getElementById('f-level').value,
    notes: userNotes,
    rating: currentRating,
  };

  // Save immediately so UI updates fast
  const newId = uid();
  if (editingId) {
    const i = bottles.findIndex(b => b.id === editingId);
    bottles[i] = { ...bottles[i], ...data };
  } else {
    bottles.push({ id: newId, ...data });
  }
  save();
  document.getElementById('formBackdrop').classList.remove('open');
  render();

  // Auto-fetch tasting notes only for new bottles with no user-written notes
  if (!editingId && !userNotes) {
    fetchTastingNotes(newId, name, distillery, age, proof);
  }
}

async function fetchTastingNotes(bottleId, name, distillery, age, proof) {
  try {
    const descriptor = [name, distillery, age ? age : '', proof ? proof+'proof' : ''].filter(Boolean).join(' ');
    const prompt = `You are a bourbon expert. Give concise tasting notes for ${descriptor}. Cover nose, palate, and finish in 2-3 sentences total. Plain text only, no headers, no bullet points, no markdown.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const notes = data?.content?.[0]?.text?.trim();
    if (!notes) return;

    // Only update if notes are still empty (user hasn't edited since)
    const idx = bottles.findIndex(b => b.id === bottleId);
    if (idx !== -1 && !bottles[idx].notes) {
      bottles[idx].notes = notes;
      save();
      render();
    }
  } catch (e) {
    // Silently fail — notes just stay empty
  }
}

function deleteBottle() {
  if (!editingId || !confirm('Remove this bottle?')) return;
  bottles = bottles.filter(b => b.id !== editingId); save();
  document.getElementById('formBackdrop').classList.remove('open');
  document.getElementById('detailBackdrop').classList.remove('open');
  render();
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(id) {
  detailId = id;
  const b = bottles.find(x => x.id === id); if (!b) return;
  const t = getTheme(b.distillery);
  const stars = b.rating ? '★'.repeat(b.rating)+'☆'.repeat(5-b.rating) : '—';

  document.getElementById('detailTitle').innerHTML = `<span style="font-style:italic;color:${t.accent}">${esc(b.name)}</span>`;

  let bodyHTML = `
    <div class="detail-section" style="padding-bottom:16px">
      <div class="distillery-tag" style="border-color:${t.accent};color:${t.accent};background:${t.color}22">${esc(b.distillery||'Independent')}</div>`;

  if (b.status === 'finished') {
    const duration = b.openDate && b.finishDate ? daysBetween(b.openDate, b.finishDate) : null;
    bodyHTML += `
      <div class="detail-grid">
        <div class="detail-item"><div class="dl">Opened</div><div class="dv">${formatDate(b.openDate)}</div></div>
        <div class="detail-item"><div class="dl">Finished</div><div class="dv" style="color:var(--finished)">${formatDate(b.finishDate)}</div></div>
        <div class="detail-item"><div class="dl">Duration</div><div class="dv" style="color:var(--finished)">${duration !== null ? duration+' days' : '—'}</div></div>
        <div class="detail-item"><div class="dl">Rating</div><div class="dv" style="color:var(--gold)">${stars}</div></div>
      </div>`;
  } else {
    const disp = b.status === 'sealed' ? 100 : b.level;
    const lc   = levelColor(b.level);
    const days = daysOpen(b.openDate);
    const risk = getOxidationRisk(b);
    bodyHTML += `
      <div style="margin-bottom:10px">
        <div class="detail-level">
          <div class="detail-level-track"><div class="detail-level-fill" style="width:${disp}%;background:${lc}"></div></div>
          <div style="color:${lc};font-size:1.1rem;font-family:var(--font-display);width:44px;text-align:right">${disp}%</div>
        </div>
      </div>
      ${b.status==='open'&&days!==null
        ?`<div style="font-size:11px;color:var(--muted)">Opened <span style="color:var(--cream)">${formatDate(b.openDate)}</span> · <span style="color:${t.accent}">${days} days ago</span></div>`
        :b.openDate?`<div style="font-size:11px;color:var(--muted)">Date: <span style="color:var(--cream)">${formatDate(b.openDate)}</span></div>`:''}
      ${risk.level !== 'none' ? `
        <div class="risk-detail ${risk.level}" style="margin-top:12px">
          <div class="risk-detail-title">${risk.level === 'high' ? '⚠ High Oxidation Risk' : '◆ Moderate Oxidation Risk'}</div>
          <p>${risk.level === 'high'
            ? 'Flavor degradation is likely underway. Bright top notes may have faded. Finish this bottle soon.'
            : 'Approaching the window where oxidation becomes noticeable. Keep an eye on flavor changes.'}</p>
          <div class="drink-by-big">Drink by ${risk.drinkByDate}</div>
          <p style="margin-top:4px;font-size:10px;opacity:0.7">~${risk.monthsRemaining} month${risk.monthsRemaining!==1?'s':''} remaining · based on fill level &amp; days open</p>
        </div>` : ''}`;
  }

  bodyHTML += `</div>
    <div class="detail-section" style="padding-top:16px">
      <div class="detail-grid">
        <div class="detail-item"><div class="dl">Mashbill</div><div class="dv">${esc(b.mashbill)||'—'}</div></div>
        <div class="detail-item"><div class="dl">Age</div><div class="dv">${esc(b.age)||'—'}</div></div>
        <div class="detail-item"><div class="dl">Proof</div><div class="dv">${b.proof?b.proof+'°':'—'}</div></div>
        <div class="detail-item"><div class="dl">Price Paid</div><div class="dv">${b.price?'$'+b.price:'—'}</div></div>
        <div class="detail-item"><div class="dl">Status</div><div class="dv" style="text-transform:capitalize">${b.status}</div></div>
        ${b.status !== 'finished' ? `<div class="detail-item"><div class="dl">Rating</div><div class="dv" style="color:var(--gold)">${stars}</div></div>` : ''}
      </div>
    </div>
    ${b.notes?`<div style="padding-top:16px"><div class="dl" style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Tasting Notes</div><div class="detail-notes">${esc(b.notes)}</div></div>`:''}`;

  document.getElementById('detailBody').innerHTML = bodyHTML;
  document.getElementById('detailBackdrop').classList.add('open');
}

function closeDetailModal(e) {
  if (e && e.target !== document.getElementById('detailBackdrop')) return;
  document.getElementById('detailBackdrop').classList.remove('open');
}
function editFromDetail() {
  document.getElementById('detailBackdrop').classList.remove('open');
  openEditModal(detailId);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('formBackdrop').classList.remove('open');
    document.getElementById('detailBackdrop').classList.remove('open');
  }
});

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportCabinet() {
  const data = JSON.stringify(bottles, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `bourbon-cabinet-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importCabinet(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      if (!confirm(`This will replace your current cabinet (${bottles.length} bottles) with ${imported.length} imported bottles. Continue?`)) return;
      bottles = imported;
      save();
      render();
    } catch(err) {
      alert('Import failed — file does not appear to be a valid cabinet export.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
let acSelectedIdx = -1;

function onNameInput(val) {
  const list = document.getElementById('acList');
  if (!val || val.length < 2) { list.classList.remove('open'); return; }

  const q = val.toLowerCase();
  const matches = BOURBON_CATALOGUE.filter(b =>
    b.name.toLowerCase().includes(q)
  ).slice(0, 12);

  if (!matches.length) { list.classList.remove('open'); return; }

  acSelectedIdx = -1;
  list.innerHTML = matches.map((b, i) =>
    `<div class="autocomplete-item" data-idx="${i}"
       onmousedown="selectCatalogueItem(${i})"
       onmouseover="acHover(${i})">
      <div class="ac-name">${esc(b.name)}</div>
      <div class="ac-meta">${esc(b.distillery)} · ${b.proof}° · ${esc(b.age)}</div>
    </div>`
  ).join('');
  list._matches = matches;
  list.classList.add('open');
}

function onNameKeydown(e) {
  const list = document.getElementById('acList');
  if (!list.classList.contains('open')) return;
  const items = list.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acSelectedIdx = Math.min(acSelectedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acSelectedIdx = Math.max(acSelectedIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelectedIdx));
  } else if (e.key === 'Enter' && acSelectedIdx >= 0) {
    e.preventDefault();
    selectCatalogueItem(acSelectedIdx);
  } else if (e.key === 'Escape') {
    closeAutocomplete();
  }
}

function acHover(idx) {
  acSelectedIdx = idx;
  document.querySelectorAll('#acList .autocomplete-item')
    .forEach((el, i) => el.classList.toggle('selected', i === idx));
}

function selectCatalogueItem(idx) {
  const list = document.getElementById('acList');
  const item = list._matches[idx];
  if (!item) return;
  document.getElementById('f-name').value = item.name;
  if (item.distillery) setDistVal(item.distillery);
  if (item.age)        document.getElementById('f-age').value      = item.age;
  if (item.proof)      document.getElementById('f-proof').value    = item.proof;
  if (item.mashbill)   document.getElementById('f-mashbill').value = item.mashbill;
  closeAutocomplete();
  setScanStatus('Fields filled from catalogue — review and save', 'success');
}

function closeAutocomplete() {
  document.getElementById('acList').classList.remove('open');
}

// ── SEED DATA ─────────────────────────────────────────────────────────────────
// No seed data — cabinet starts empty

render();
</script>
